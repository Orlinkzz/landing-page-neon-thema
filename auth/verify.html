<!doctype html>
<html lang="id" data-theme="cyber" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email — NeonLaunch</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            night: 'rgb(var(--night) / <alpha-value>)',
            neon: {
              cyan: 'rgb(var(--neon-cyan) / <alpha-value>)',
              pink: 'rgb(var(--neon-pink) / <alpha-value>)',
              lime: 'rgb(var(--neon-lime) / <alpha-value>)',
              violet: 'rgb(var(--neon-violet) / <alpha-value>)',
            }
          },
          fontFamily: { display: ["Space Grotesk","Inter","ui-sans-serif","system-ui"] }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="../assets/themes.css" />
  <link rel="stylesheet" href="../assets/styles.css" />
</head>

<body class="bg-night text-white antialiased">
  <div class="neo-bg">
    <div class="neo-bg__gradients"></div>
    <div class="neo-bg__grid"></div>
    <div class="neo-bg__noise"></div>
  </div>

  <header class="fixed inset-x-0 top-0 z-50">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="neo-nav mt-3 flex items-center justify-between rounded-2xl px-4 py-3">
        <a href="../index.html" class="flex items-center gap-2">
          <span class="neo-logo">◆</span>
          <span class="font-display text-lg tracking-wide">NeonLaunch</span>
        </a>

        <div class="flex items-center gap-3">
          <div class="relative">
            <button id="themeBtn" class="neo-btn neo-btn--ghost" type="button" aria-expanded="false">
              Theme: <span id="themeLabel">Cyber</span>
              <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none">
                <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div id="themeMenu" class="hidden absolute right-0 mt-2 w-48 rounded-2xl border border-white/10 bg-black/50 backdrop-blur p-2">
              <button class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10 transition" data-theme="cyber">Cyber Blue</button>
              <button class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10 transition" data-theme="pink">Neon Pink</button>
              <button class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10 transition" data-theme="acid">Acid Lime</button>
            </div>
          </div>
          <a class="neo-btn" href="./login.html">Login</a>
        </div>
      </div>
    </div>
  </header>

  <div id="toastHost" class="fixed right-4 top-24 z-50 w-[min(420px,calc(100vw-2rem))] space-y-3"></div>

  <main class="pt-28 sm:pt-32 pb-12">
    <div class="mx-auto max-w-xl px-4 sm:px-6 lg:px-8">
      <section class="neo-card p-6 sm:p-10 reveal">
        <h1 class="font-display text-3xl">Verifikasi Email</h1>
        <p class="mt-2 text-white/70">
          Masukkan kode 6 digit yang dikirim ke email kamu.
          <span class="block text-xs text-white/50 mt-1">Mode demo: kode muncul saat register.</span>
        </p>

        <form id="verifyForm" class="mt-8 grid gap-4">
          <div>
            <label class="text-sm text-white/70" for="email">Email</label>
            <input id="email" name="email" type="email" class="neo-input" placeholder="email@domain.com" autocomplete="email" required />
          </div>
          <div>
            <label class="text-sm text-white/70" for="code">Kode</label>
            <input id="code" name="code" class="neo-input tracking-widest text-center" placeholder="123456" inputmode="numeric" required />
          </div>

          <button type="submit" class="neo-btn w-full">Verifikasi</button>

          <button type="button" id="btnResend" class="neo-btn neo-btn--ghost w-full">Kirim ulang (demo)</button>
        </form>

        <div class="mt-8 border-t border-white/10 pt-6 text-sm text-white/60">
          © <span id="year"></span> NeonLaunch
        </div>
      </section>
    </div>
  </main>

  <script src="./auth.js"></script>
  <script>
    Auth.initCommon();

    const emailParam = Auth.getParam("email");
    if (emailParam) document.getElementById("email").value = emailParam;

    const form = document.getElementById("verifyForm");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      Auth.setLoading(form, true);
      try {
        const email = form.email.value.trim();
        const code = form.code.value.trim();
        await Auth.verify({ email, code });
        Auth.toast("Verifikasi berhasil! Silakan login.", "success");
        setTimeout(() => (window.location.href = "./login.html"), 700);
      } catch (err) {
        Auth.toast(err?.message || "Gagal verifikasi.", "error");
      } finally {
        Auth.setLoading(form, false);
      }
    });

    document.getElementById("btnResend").addEventListener("click", () => {
      const email = document.getElementById("email").value.trim();
      if (!email) return Auth.toast("Isi email dulu.", "error");
      const code = Auth.createVerifyCode(email);
      Auth.toast(`Demo: kode verifikasi baru = ${code}`, "info");
    });
  </script>
</body>
</html>
