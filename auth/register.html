<!doctype html>
<html lang="id" data-theme="cyber" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — NeonLaunch</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            night: 'rgb(var(--night) / <alpha-value>)',
            neon: {
              cyan: 'rgb(var(--neon-cyan) / <alpha-value>)',
              pink: 'rgb(var(--neon-pink) / <alpha-value>)',
              lime: 'rgb(var(--neon-lime) / <alpha-value>)',
              violet: 'rgb(var(--neon-violet) / <alpha-value>)',
            }
          },
          fontFamily: {
            display: ["Space Grotesk","Inter","ui-sans-serif","system-ui"],
            sans: ["Inter","ui-sans-serif","system-ui"],
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="../assets/themes.css" />
  <link rel="stylesheet" href="../assets/styles.css" />
</head>

<body class="bg-night text-white antialiased">
  <div class="neo-bg">
    <div class="neo-bg__gradients"></div>
    <div class="neo-bg__grid"></div>
    <div class="neo-bg__noise"></div>
  </div>

  <header class="fixed inset-x-0 top-0 z-50">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="neo-nav mt-3 flex items-center justify-between rounded-2xl px-4 py-3">
        <a href="../index.html" class="flex items-center gap-2">
          <span class="neo-logo">◆</span>
          <span class="font-display text-lg tracking-wide">NeonLaunch</span>
        </a>

        <div class="flex items-center gap-3">
          <div class="relative">
            <button id="themeBtn" class="neo-btn neo-btn--ghost" type="button" aria-expanded="false">
              Theme: <span id="themeLabel">Cyber</span>
              <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none">
                <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div id="themeMenu" class="hidden absolute right-0 mt-2 w-48 rounded-2xl border border-white/10 bg-black/50 backdrop-blur p-2">
              <button class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10 transition" data-theme="cyber">Cyber Blue</button>
              <button class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10 transition" data-theme="pink">Neon Pink</button>
              <button class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10 transition" data-theme="acid">Acid Lime</button>
            </div>
          </div>
          <a class="neo-btn" href="./login.html">Login</a>
        </div>
      </div>
    </div>
  </header>

  <div id="toastHost" class="fixed right-4 top-24 z-50 w-[min(420px,calc(100vw-2rem))] space-y-3"></div>

  <main class="pt-28 sm:pt-32 pb-12">
    <div class="mx-auto max-w-4xl px-4 sm:px-6 lg:px-8">
      <section class="neo-card p-6 sm:p-10 reveal">
        <h1 class="font-display text-4xl">Buat akun</h1>
        <p class="mt-2 text-white/70">Sudah punya akun? <a class="neo-link" href="./login.html">Login</a></p>

        <form id="registerForm" class="mt-8 grid gap-4">
          <div>
            <label class="text-sm text-white/70" for="name">Nama</label>
            <input id="name" name="name" class="neo-input" placeholder="Nama kamu" autocomplete="name" required />
          </div>

          <div>
            <label class="text-sm text-white/70" for="email">Email</label>
            <input id="email" name="email" type="email" class="neo-input" placeholder="email@domain.com" autocomplete="email" required />
          </div>

          <div>
            <label class="text-sm text-white/70" for="password">Password</label>
            <div class="relative">
              <input id="password" name="password" type="password" class="neo-input pr-24" placeholder="Minimal 8 karakter" autocomplete="new-password" required />
              <button type="button" data-toggle-password="password" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-white/60 hover:text-white transition">
                Lihat
              </button>
            </div>
            <p class="mt-1 text-xs text-white/50">Demo: password disimpan localStorage. Untuk produksi, pindah ke backend.</p>
          </div>

          <div>
            <label class="text-sm text-white/70" for="confirm">Konfirmasi Password</label>
            <div class="relative">
              <input id="confirm" name="confirm" type="password" class="neo-input pr-24" placeholder="Ulangi password" autocomplete="new-password" required />
              <button type="button" data-toggle-password="confirm" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-white/60 hover:text-white transition">
                Lihat
              </button>
            </div>
          </div>

          <label class="flex items-start gap-2 text-sm text-white/70">
            <input id="agree" type="checkbox" class="mt-1 accent-white" required />
            <span>
              Saya setuju dengan <a class="neo-link" href="../terms.html">Terms</a> dan <a class="neo-link" href="../privacy.html">Privacy</a>.
            </span>
          </label>

          <button type="submit" class="neo-btn w-full">Register</button>

          <!-- Demo info box -->
          <div id="demoBox" class="hidden rounded-2xl border border-white/10 bg-white/5 p-4 text-sm text-white/75">
            <div class="font-semibold">Demo verify code:</div>
            <div class="mt-1">
              Kode: <span id="demoCode" class="neo-text font-semibold"></span>
            </div>
            <div class="mt-2">
              Lanjut verifikasi: <a id="demoVerifyLink" class="neo-link" href="#">Buka halaman verify</a>
            </div>
          </div>
        </form>

        <div class="mt-8 border-t border-white/10 pt-6 text-sm text-white/60">
          © <span id="year"></span> NeonLaunch
        </div>
      </section>
    </div>
  </main>

  <script src="./auth.js"></script>
  <script>
    Auth.initCommon();

    const form = document.getElementById("registerForm");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = form.name.value.trim();
      const email = form.email.value.trim();
      const password = form.password.value;
      const confirm = form.confirm.value;

      if (password.length < 8) return Auth.toast("Password minimal 8 karakter.", "error");
      if (password !== confirm) return Auth.toast("Konfirmasi password tidak sama.", "error");

      Auth.setLoading(form, true);
      try {
        const res = await Auth.register({ name, email, password });

        Auth.toast("Register berhasil. Silakan verifikasi email.", "success");

        // Demo: tampilkan code & link
        const box = document.getElementById("demoBox");
        const code = document.getElementById("demoCode");
        const link = document.getElementById("demoVerifyLink");

        if (res?.verifyCode) {
          box.classList.remove("hidden");
          code.textContent = res.verifyCode;
          link.href = `./verify.html?email=${encodeURIComponent(email)}`;
        }

        setTimeout(() => (window.location.href = `./verify.html?email=${encodeURIComponent(email)}`), 900);
      } catch (err) {
        Auth.toast(err?.message || "Gagal register.", "error");
      } finally {
        Auth.setLoading(form, false);
      }
    });
  </script>
</body>
</html>
