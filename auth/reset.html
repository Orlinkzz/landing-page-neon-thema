<!doctype html>
<html lang="id" data-theme="cyber">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — NeonLaunch</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { night: 'rgb(var(--night) / <alpha-value>)' }, fontFamily: { display: ["Space Grotesk","Inter","ui-sans-serif","system-ui"] } } }
    }
  </script>

  <link rel="stylesheet" href="../assets/themes.css" />
  <link rel="stylesheet" href="../assets/styles.css" />
</head>

<body class="bg-night text-white antialiased">
  <div class="neo-bg">
    <div class="neo-bg__gradients"></div>
    <div class="neo-bg__grid"></div>
    <div class="neo-bg__noise"></div>
  </div>

  <header class="fixed inset-x-0 top-0 z-50">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="neo-nav mt-3 flex items-center justify-between rounded-2xl px-4 py-3">
        <a href="../index.html" class="flex items-center gap-2">
          <span class="neo-logo">◆</span>
          <span class="font-display text-lg tracking-wide">NeonLaunch</span>
        </a>
        <div class="flex items-center gap-3">
          <div class="relative">
            <button id="themeBtn" class="neo-btn neo-btn--ghost" type="button" aria-expanded="false">
              Theme: <span id="themeLabel">Cyber</span>
              <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none">
                <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div id="themeMenu" class="hidden absolute right-0 mt-2 w-48 rounded-2xl border border-white/10 bg-black/50 backdrop-blur p-2">
              <button class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10 transition" data-theme="cyber">Cyber Blue</button>
              <button class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10 transition" data-theme="pink">Neon Pink</button>
              <button class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10 transition" data-theme="acid">Acid Lime</button>
            </div>
          </div>
          <a class="neo-btn" href="./login.html">Login</a>
        </div>
      </div>
    </div>
  </header>

  <div id="toastHost" class="fixed right-4 top-24 z-50 w-[min(420px,calc(100vw-2rem))] space-y-3"></div>

  <main class="pt-28 sm:pt-32 pb-12">
    <div class="mx-auto max-w-xl px-4 sm:px-6 lg:px-8">
      <section class="neo-card p-6 sm:p-10 reveal">
        <h1 class="font-display text-3xl">Reset Password</h1>
        <p class="mt-2 text-white/70">Masukkan password baru.</p>

        <div class="mt-3 text-xs text-white/50">
          Token: <span id="tokenLabel" class="neo-text"></span>
        </div>

        <form id="resetForm" class="mt-8 grid gap-4">
          <div>
            <label class="text-sm text-white/70" for="newPassword">Password baru</label>
            <div class="relative">
              <input id="newPassword" name="newPassword" type="password" class="neo-input pr-24" placeholder="Minimal 8 karakter" required />
              <button type="button" data-toggle-password="newPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-white/60 hover:text-white transition">
                Lihat
              </button>
            </div>
          </div>

          <div>
            <label class="text-sm text-white/70" for="confirm">Konfirmasi</label>
            <div class="relative">
              <input id="confirm" name="confirm" type="password" class="neo-input pr-24" placeholder="Ulangi password" required />
              <button type="button" data-toggle-password="confirm" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-white/60 hover:text-white transition">
                Lihat
              </button>
            </div>
          </div>

          <button type="submit" class="neo-btn w-full">Simpan password</button>
        </form>

        <div class="mt-8 border-t border-white/10 pt-6 text-sm text-white/60">
          © <span id="year"></span> NeonLaunch
        </div>
      </section>
    </div>
  </main>

  <script src="./auth.js"></script>
  <script>
    Auth.initCommon();

    const token = Auth.getParam("token");
    document.getElementById("tokenLabel").textContent = token ? token : "(tidak ada)";

    const form = document.getElementById("resetForm");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!token) return Auth.toast("Token reset tidak ada. Buka dari link reset.", "error");

      const p1 = form.newPassword.value;
      const p2 = form.confirm.value;
      if (p1.length < 8) return Auth.toast("Password minimal 8 karakter.", "error");
      if (p1 !== p2) return Auth.toast("Konfirmasi password tidak sama.", "error");

      Auth.setLoading(form, true);
      try {
        await Auth.reset({ token, newPassword: p1 });
        Auth.toast("Password berhasil diubah. Silakan login.", "success");
        setTimeout(() => (window.location.href = "./login.html"), 800);
      } catch (err) {
        Auth.toast(err?.message || "Gagal reset password.", "error");
      } finally {
        Auth.setLoading(form, false);
      }
    });
  </script>
</body>
</html>
